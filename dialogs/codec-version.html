<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>编解码器版本信息</title>
    <style>
      body { margin: 0; padding: 0; background-color: #c0c0c0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
      .window { box-shadow: none; border: none; flex: 1; display: flex; flex-direction: column; }
      .window-body { flex: 1; margin: 0; padding: 15px 20px; display: flex; flex-direction: column; }
      [data-tauri-drag-region] {
        user-select: none;
        -webkit-user-select: none;
      }
      .info-text { margin-bottom: 20px; line-height: 1.6; font-size: 11px; padding-left: 50px; }
      .controls { display: flex; justify-content: flex-end; margin-top: 10px; }
      textarea { flex: 1; width: 100%; resize: none; font-size: 11px; margin-top: 10px; box-sizing: border-box; }
    </style>
  </head>
  <body>
    <div class="window">
      <div data-tauri-drag-region class="title-bar" style="padding: 2px 2px 2px 3px;">
        <div data-tauri-drag-region class="title-bar-text" style="display: inline-flex; align-items: center; gap: 4px;">
          <span style="pointer-events: none;">编解码器版本信息</span>
        </div>
        <div data-tauri-drag-region class="title-bar-controls">
          <button aria-label="Close" onclick="closeWindow()"></button>
        </div>
      </div>
      <div class="window-body">
        <div class="info-text">
          <div>ogv.js 音频/视频解码器 1.8.9</div>
          <div>用来适配类人开发出来的浏览器内核（WebKit我操你妈）</div>
          <div>Copyright (C) 2013-2024 Brion Vibber and contributors</div>
        </div>
        
        <hr style="width: 100%; border-top: 2px solid #808080; border-bottom: 2px solid #ffffff; border-left: none; border-right: none; margin: 0;" />
        
        <textarea readonly>其余使用框架：
Tauri v2
Vite 7.3.1
Typescript 5.9.3
Jquery 4.0.0
        </textarea>
        
        <div class="controls">
          <button onclick="closeWindow()" style="width: 80px; padding: 2px 0;">OK</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/Dialogs/codec-version.ts"></script>
  </body>
</html>
