syntax = "proto3";

package events;


enum InstructionType {
  PlayDialog = 0;
  ShowDecision = 1;
  PlayBgm = 2;
  PlaySe = 3;
  SetBgImg = 4;
  SetCharaImg = 5;
  ShakeScreen = 6;
  TransitionToGraphics = 7;
  TransitionToGraphicsFade = 8;
  ShowCg = 9;
  FadeSystemToBlack = 10;
  SetGraphicsState = 11;
  ToggleGraphicsFlag = 12;
  AutoContinue = 13;
  IncMemory = 14;
  ShowStaffA = 15;
  ShowStaffB = 16;
}


message Instruction {
  InstructionType type = 1;
  repeated int32 params = 2;
  repeated string stringParams=3; // ['${strin_index}', ...] or ['{int_flag}', ...]
}


message ConditionalReturn {
  repeated int32 passedEvIds = 1;
  int32 returnValue = 2;
}


message EventMapping {
  int32 evId = 1;
  bool flag1 = 2;
  string evFunc = 3;
  repeated Instruction instructions = 4;
  repeated ConditionalReturn conditionalReturns = 5;
  repeated int32 returnValues = 6;
  bool hasChoices = 7;
  repeated int32 fromEvents = 8;
}


message EventMappings {
  repeated string textPool = 2;
  repeated EventMapping events = 3;
}

