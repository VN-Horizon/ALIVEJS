<!doctype html>
<html lang="en" style="background: #0000">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alive Remake</title>
    <script type="module" src="./src/main.ts"></script>
  </head>
  <body style="margin: 0; padding: 0; overflow: hidden; background: #0000; opacity: 0; text-shadow: var(--index-global-textshadow, none)">
    <div class="window" style="width: 100vw; height: 100vh">
      <div data-tauri-drag-region class="title-bar" style="padding: 2px 2px 2px 3px;">
        <div data-tauri-drag-region class="title-bar-text" style="display: inline-flex; align-items: center; gap: 4px;">
          <img data-tauri-drag-region src="/icon.png" style="width: 16px;" alt="App Icon" />
          <span data-tauri-drag-region>ALIVE Renewal</span>
        </div>
        <div data-tauri-drag-region class="title-bar-controls">
          <button onclick="window.minimize()" aria-label="Minimize"></button>
          <button id="toggleMaximizeBtn" onclick="window.toggleMaximize()" aria-label="Maximize"></button>
          <button onclick="window.exit(0)" aria-label="Close"></button>
        </div>
      </div>

      <div class="menu-bar">
        <div class="menu-bar-item">
          <button aria-label="File">文件 (<u>F</u>)</button>
          <ul class="menu">
            <li onclick="location.reload()">主界面 (<u>N</u>)</li>
            <li id="menu-save" aria-disabled="true">保存 (<u>S</u>)</li>
            <li id="menu-load">加载 (<u>L</u>)</li>
            <li class="divider"></li>
            <li onclick="window.openSettings()">设置 (<u>T</u>)</li>
            <li class="divider"></li>
            <li>隐藏对话框 (<u>H</u>)</li>
            <li>全屏 (<u>F</u>)</li>
            <li class="divider"></li>
            <li onclick="window.exit(0)">退出 (<u>X</u>)</li>
          </ul>
        </div>
        <div class="menu-bar-item">
          <button aria-label="File">帮助 (<u>H</u>)</button>
          <ul class="menu">
            <li onclick="window.openVersionInfo()">版本信息 (<u>A</u>)...</li>
            <li onclick="window.openCodecVersionInfo()">编解码器版本信息 (<u>C</u>)</li>
          </ul>
        </div>
      </div>
      <div class="window-body">
        <div id="gameContainer"></div>
        <div id="black-overlay"></div>
      </div>
    </div>
