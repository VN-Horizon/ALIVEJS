# https://schema.tauri.app/config/2
productName = "alivejs"
version = "0.1.0"
identifier = "org.loclab.alivejs"

[build]
beforeDevCommand = "pnpm dev"
devUrl = "http://localhost:1420"
beforeBuildCommand = "pnpm build"
frontendDist = "../dist"

[app]
withGlobalTauri = true

[[app.windows]]
title = "ALIVE Renewal"
width = 647
height = 531
minWidth = 229
minHeight = 217
decorations = false
transparent = true
center = true

[bundle]
active = true
targets = "all"
icon = [
  "icons/32x32.png",
  "icons/128x128.png",
  "icons/128x128@2x.png",
  "icons/icon.icns",
  "icons/icon.ico"
]